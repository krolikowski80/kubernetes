apiVersion: v1
kind: Pod
metadata:
  name: logs-learning
spec:
  containers:
    - name: ubuntu
      image: ubuntu:20.04
      command: ["sleep", "inf"]
    - name: nginx
      image: nginx
      ports:
        - containerPort: 80
    - name: httpd
      image: httpd
      ports:
        - containerPort: 8080
